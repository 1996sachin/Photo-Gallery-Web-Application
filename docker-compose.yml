
version: '3.9'

services:

  postgres:
    image: postgres:17
    container_name: photo-gallery-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: memoriesdb
      POSTGRES_USER: sachin
      POSTGRES_PASSWORD: password

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5433:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sachin -d memoriesdb"]
      interval: 10s
      timeout: 5s
      retries: 5


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: photo-gallery-api

    restart: unless-stopped

    env_file:
      - ./backend/.env

    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      - ./backend/uploads:/app/uploads

    ports:
      - "8005:8000"


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: photo-gallery-frontend

    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "3000:80"

volumes:
  postgres_data:
